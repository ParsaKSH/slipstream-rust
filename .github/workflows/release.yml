name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: slipstream-linux-amd64
            ext: ""
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: slipstream-linux-arm64
            ext: ""
          - name: darwin-amd64
            runner: macos-14
            target: x86_64-apple-darwin
            artifact_name: slipstream-darwin-amd64
            ext: ""
            cargo_features: "--features openssl-vendored"
          - name: darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: slipstream-darwin-arm64
            ext: ""
            cargo_features: ""
          - name: windows-amd64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: slipstream-windows-amd64
            ext: ".exe"
            vcpkg_triplet: x64-windows-static-md
            cargo_features: ""
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: slipstream-windows-arm64
            ext: ".exe"
            vcpkg_triplet: arm64-windows-static-md
            cargo_features: ""
    steps:
      - name: Check out slipstream-rust
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libssl-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake pkg-config openssl@3
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_ROOT_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install pkgconfiglite -y
          vcpkg install openssl:${{ matrix.vcpkg_triplet }}
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\${{ matrix.vcpkg_triplet }}"
          echo "OPENSSL_DIR=$root" >> $env:GITHUB_ENV
          echo "OPENSSL_ROOT_DIR=$root" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$root\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$root\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_USE_STATIC_LIBS=TRUE" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$root\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            ${{ matrix.cargo_features }} \
            -p slipstream-client -p slipstream-server

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          base_name="${{ matrix.artifact_name }}"
          archive_name="${base_name}-${tag}"
          bin_dir="target/${{ matrix.target }}/release"
          staging="${archive_name}"

          mkdir -p "${staging}"
          cp "${bin_dir}/slipstream-client${{ matrix.ext }}" "${staging}/"
          cp "${bin_dir}/slipstream-server${{ matrix.ext }}" "${staging}/"
          cp README.md LICENSE* docs/*.md "${staging}/" 2>/dev/null || true

          if [[ "${{ matrix.ext }}" == ".exe" ]]; then
            7z a "${archive_name}.zip" "${staging}"
          else
            tar czf "${archive_name}.tar.gz" "${staging}"
          fi

          cd "${staging}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum slipstream-client${{ matrix.ext }} slipstream-server${{ matrix.ext }} > SHA256SUMS
          else
            shasum -a 256 slipstream-client${{ matrix.ext }} slipstream-server${{ matrix.ext }} > SHA256SUMS
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out slipstream-rust
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: "Slipstream ${{ github.ref_name || inputs.tag }}"
          draft: false
          prerelease: ${{ contains(github.ref_name || inputs.tag, '-rc') || contains(github.ref_name || inputs.tag, '-beta') || contains(github.ref_name || inputs.tag, '-alpha') }}
          generate_release_notes: true
          files: |
            release-assets/*
